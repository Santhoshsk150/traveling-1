<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanspot | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { darkBg: '#030305', darkSurface: '#0a0a0e', neonRed: '#d91616', neonCyan: '#00f0ff', }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Oswald', 'sans-serif'], } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkBg text-white font-sans antialiased overflow-x-hidden selection:bg-neonRed selection:text-white relative">
    <header id="main-header" class="fixed w-full z-50 bg-darkBg/90 backdrop-blur-md border-b border-white/5 transition-all duration-300 py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-neonRed p-2 shadow-[0_0_15px_rgba(217,22,22,0.6)] text-white"><i class="fas fa-crosshairs text-2xl"></i></div>
                <div><h1 class="text-2xl font-black leading-none tracking-tighter font-heading">TANSPOT</h1><p class="text-[9px] uppercase tracking-[3px] text-neonCyan font-bold">Obsidian Transit</p></div>
            </div>
            <nav class="hidden lg:flex space-x-8 font-bold text-sm uppercase tracking-wider font-heading">
                <a href="travling.html" class="hover:text-neonRed transition">Home</a>
                <a href="about.html" class="hover:text-neonRed transition">About</a>
                <a href="services.html" class="hover:text-neonRed transition">Services <i class="fa fa-chevron-down text-[10px] ml-1"></i></a>
                <a href="network.html" class="hover:text-neonRed transition">Network</a>
                <a href="logistics.html" class="hover:text-neonRed transition">Logistics</a>
                <a href="contact.html" class="text-neonRed">Contact</a>
            </nav>
            <div class="flex items-center space-x-6"><i class="fas fa-search cursor-pointer hover:text-neonCyan hidden md:block"></i><button class="bg-transparent border border-neonRed text-white px-7 py-3 font-heading font-extrabold text-xs flex items-center group hover:bg-neonRed shadow-[0_0_10px_rgba(217,22,22,0.2)] hover:shadow-[0_0_20px_rgba(217,22,22,0.6)] transition-all">INITIATE TRACKING <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i></button></div>
        </div>
    </header>

    <section class="hero-section h-[70vh] flex items-center text-white relative overflow-hidden">
        <div class="hero-background absolute inset-0 z-0"><div class="grid-overlay"></div><div class="glow-orb"></div></div>
        <div class="container mx-auto px-6 relative z-10 text-center" data-aos="fade-up">
            <div class="inline-block p-1 bg-neonCyan/20 mb-6 border border-neonCyan/30"><h4 class="text-neonCyan font-bold tracking-[5px] uppercase font-heading text-sm px-4">Classified Core File</h4></div>
            <h1 class="text-6xl md:text-8xl font-black leading-tight mb-6 font-heading tracking-tight drop-shadow-2xl uppercase">SECURE COMMS</h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto uppercase tracking-widest">Open Encrypted Channel</p>
            <div class="mt-12"><a href="travling.html" class="inline-block border border-white/20 px-8 py-3 text-sm font-bold tracking-widest uppercase hover:bg-white hover:text-black transition">Return to Base</a></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#020202] text-white pt-24 pb-12 border-t border-neonRed/20 relative mt-20">
        <div class="container mx-auto px-6 relative z-10">
            <p class="text-center text-gray-600 text-xs tracking-[4px] font-bold uppercase">© 2026 Tanspot Core Data. End of transmission.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="script.js"></script>

</html>
